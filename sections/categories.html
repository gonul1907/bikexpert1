<!--
  SECTION: sections/categories.html
  Shopify: {% section 'categories' %}
-->
<section class="section bg-bx-light" aria-labelledby="categories-heading">
  <div class="bx-container">

    <div class="text-center mb-12">
      <p class="section-label" data-animate>Wat zoek je?</p>
      <h2 id="categories-heading" class="text-display-md font-black tracking-tight" data-animate style="animation-delay:0.05s">
        Shop per categorie
      </h2>
    </div>

    <!-- 2-col top + 3-col bottom bento grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">

      <!-- E-bikes (large) -->
      <a
        href="/collections/ebikes"
        class="group relative block rounded-3xl overflow-hidden col-span-1 md:col-span-2 lg:col-span-2 aspect-video lg:aspect-[16/8]"
        data-animate
        aria-label="Bekijk e-bikes"
      >
        <img src="https://images.unsplash.com/photo-1571068316344-75bc76f77890?w=1200&q=80&auto=format" alt="E-bikes collectie" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-103" loading="lazy" decoding="async">
        <div class="absolute inset-0 overlay-dark flex flex-col justify-end p-8">
          <span class="badge-new mb-3 self-start">Meest verkocht</span>
          <h3 class="text-white font-black text-2xl md:text-3xl tracking-tight">E-Bikes</h3>
          <p class="text-white/70 text-sm mt-1 mb-4">City, speed & mountain — alle elektrische fietsen</p>
          <span class="inline-flex items-center gap-1.5 text-bx-accent font-semibold text-sm group-hover:gap-3 transition-all">
            Bekijk collectie
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </a>

      <!-- Stadsfietsen -->
      <a
        href="/collections/stadsfietsen"
        class="group relative block rounded-3xl overflow-hidden aspect-square md:aspect-auto lg:aspect-[3/4]"
        data-animate style="animation-delay:0.08s"
        aria-label="Bekijk stadsfietsen"
      >
        <img src="https://images.unsplash.com/photo-1502744688674-c619d1586c9e?w=700&q=80&auto=format" alt="Stadsfietsen" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-103" loading="lazy" decoding="async">
        <div class="absolute inset-0 overlay-dark flex flex-col justify-end p-6">
          <h3 class="text-white font-black text-xl tracking-tight">Stadsfietsen</h3>
          <span class="inline-flex items-center gap-1.5 text-bx-accent font-semibold text-sm mt-1 group-hover:gap-3 transition-all">
            Bekijk <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </a>

      <!-- Racefietsen -->
      <a
        href="/collections/racefietsen"
        class="group relative block rounded-3xl overflow-hidden aspect-video md:aspect-auto"
        data-animate style="animation-delay:0.16s"
        aria-label="Bekijk racefietsen"
      >
        <img src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?w=700&q=80&auto=format" alt="Racefietsen" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-103" loading="lazy" decoding="async">
        <div class="absolute inset-0 overlay-dark flex flex-col justify-end p-6">
          <h3 class="text-white font-black text-xl tracking-tight">Racefietsen</h3>
          <span class="inline-flex items-center gap-1.5 text-bx-accent font-semibold text-sm mt-1 group-hover:gap-3 transition-all">
            Bekijk <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </a>

      <!-- Mountainbikes -->
      <a
        href="/collections/mountainbikes"
        class="group relative block rounded-3xl overflow-hidden aspect-video md:aspect-auto"
        data-animate style="animation-delay:0.24s"
        aria-label="Bekijk mountainbikes"
      >
        <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=700&q=80&auto=format" alt="Mountainbikes" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-103" loading="lazy" decoding="async">
        <div class="absolute inset-0 overlay-dark flex flex-col justify-end p-6">
          <h3 class="text-white font-black text-xl tracking-tight">Mountainbikes</h3>
          <span class="inline-flex items-center gap-1.5 text-bx-accent font-semibold text-sm mt-1 group-hover:gap-3 transition-all">
            Bekijk <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </a>

      <!-- Accessoires -->
      <a
        href="/collections/accessoires"
        class="group relative block rounded-3xl overflow-hidden aspect-video md:aspect-auto"
        data-animate style="animation-delay:0.32s"
        aria-label="Bekijk accessoires"
      >
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e?w=700&q=80&auto=format" alt="Accessoires" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-103" loading="lazy" decoding="async">
        <div class="absolute inset-0 overlay-dark flex flex-col justify-end p-6">
          <h3 class="text-white font-black text-xl tracking-tight">Accessoires</h3>
          <span class="inline-flex items-center gap-1.5 text-bx-accent font-semibold text-sm mt-1 group-hover:gap-3 transition-all">
            Bekijk <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </div>
      </a>
    </div>
  </div>
</section>
